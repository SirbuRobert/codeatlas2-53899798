<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeAtlas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #0d0d18;
      border-bottom: 1px solid rgba(124,58,237,0.25);
      flex-shrink: 0;
    }

    #header .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #c4b5fd;
      letter-spacing: 0.02em;
    }

    #header .logo svg {
      flex-shrink: 0;
    }

    #header .version {
      font-size: 10px;
      color: #6b7280;
      font-weight: 400;
    }

    #open-tab-btn {
      font-size: 11px;
      padding: 4px 10px;
      background: transparent;
      border: 1px solid rgba(124,58,237,0.4);
      border-radius: 5px;
      color: #a78bfa;
      cursor: pointer;
      transition: background 0.15s;
    }
    #open-tab-btn:hover { background: rgba(124,58,237,0.15); }

    #iframe-container {
      flex: 1;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #loading-overlay {
      position: absolute;
      inset: 0;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 10;
    }

    #loading-overlay.hidden { display: none; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(124,58,237,0.2);
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div id="header">
    <div class="logo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
      CodeAtlas
      <span class="version">v3.0.0</span>
    </div>
    <button id="open-tab-btn" title="Open in full tab">↗ Full tab</button>
  </div>

  <div id="iframe-container">
    <div id="loading-overlay">
      <div class="spinner"></div>
      <span class="loading-text">Loading CodeAtlas…</span>
    </div>
    <iframe id="app-frame" src="" allow="clipboard-write"></iframe>
  </div>

  <script>
    const APP_BASE = 'https://codeatlas2.lovable.app';
    const frame = document.getElementById('app-frame');
    const overlay = document.getElementById('loading-overlay');
    const openTabBtn = document.getElementById('open-tab-btn');

    let currentUrl = APP_BASE;

    function loadApp(repoPath) {
      if (repoPath) {
        currentUrl = `${APP_BASE}/?repo=${encodeURIComponent(repoPath)}&auto=true`;
      } else {
        currentUrl = APP_BASE;
      }
      frame.src = currentUrl;
      overlay.classList.remove('hidden');
    }

    frame.addEventListener('load', () => {
      overlay.classList.add('hidden');
    });

    openTabBtn.addEventListener('click', () => {
      chrome.tabs.create({ url: currentUrl });
    });

    // Check if a repo was queued by the content script
    chrome.storage.local.get('pendingRepo', (result) => {
      if (result.pendingRepo) {
        loadApp(result.pendingRepo);
        chrome.storage.local.remove('pendingRepo');
      } else {
        loadApp(null);
      }
    });

    // Listen for messages from background (ANALYZE_REPO)
    chrome.runtime.onMessage.addListener((message) => {
      if (message.type === 'ANALYZE_REPO' && message.repoPath) {
        loadApp(message.repoPath);
      }
    });

    // Also poll storage in case the message arrives before the listener is ready
    chrome.storage.onChanged.addListener((changes) => {
      if (changes.pendingRepo && changes.pendingRepo.newValue) {
        loadApp(changes.pendingRepo.newValue);
        chrome.storage.local.remove('pendingRepo');
      }
    });
  </script>
</body>
</html>
